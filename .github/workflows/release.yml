name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            name: tachy-macos-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: tachy-macos-x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: tachy-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: tachy-linux-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: tachy-windows-x86_64

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: rust
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.target != 'x86_64-pc-windows-msvc'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/tachy-cli dist/tachy
          cd dist
          tar czf ${{ matrix.name }}.tar.gz tachy
          shasum -a 256 ${{ matrix.name }}.tar.gz > ${{ matrix.name }}.tar.gz.sha256 || sha256sum ${{ matrix.name }}.tar.gz > ${{ matrix.name }}.tar.gz.sha256

      - name: Package (Windows)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target/${{ matrix.target }}/release/tachy-cli.exe" "dist/tachy.exe"
          Compress-Archive -Path "dist/tachy.exe" -DestinationPath "dist/${{ matrix.name }}.zip"
          $hash = (Get-FileHash "dist/${{ matrix.name }}.zip" -Algorithm SHA256).Hash
          "$hash  ${{ matrix.name }}.zip" | Out-File "dist/${{ matrix.name }}.zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            rust/dist/*.tar.gz
            rust/dist/*.tar.gz.sha256
            rust/dist/*.zip
            rust/dist/*.zip.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
