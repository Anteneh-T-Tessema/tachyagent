name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            name: tachy-macos-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: tachy-macos-x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: tachy-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: tachy-linux-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: tachy-windows-x86_64

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: rust

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist
          if [ "${{ matrix.target }}" = "x86_64-pc-windows-msvc" ]; then
            cp target/${{ matrix.target }}/release/tachy-cli.exe dist/tachy.exe
            cd dist && 7z a ${{ matrix.name }}.zip tachy.exe
          else
            cp target/${{ matrix.target }}/release/tachy-cli dist/tachy
            cd dist && tar czf ${{ matrix.name }}.tar.gz tachy
          fi
        shell: bash

      - name: Checksum
        run: |
          cd rust/dist
          if [ -f "${{ matrix.name }}.tar.gz" ]; then
            shasum -a 256 ${{ matrix.name }}.tar.gz > ${{ matrix.name }}.tar.gz.sha256 || sha256sum ${{ matrix.name }}.tar.gz > ${{ matrix.name }}.tar.gz.sha256
          fi
          if [ -f "${{ matrix.name }}.zip" ]; then
            shasum -a 256 ${{ matrix.name }}.zip > ${{ matrix.name }}.zip.sha256 || sha256sum ${{ matrix.name }}.zip > ${{ matrix.name }}.zip.sha256
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: rust/dist/${{ matrix.name }}.tar.gz*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
